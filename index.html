<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โปรแกรมไล่ระดับเมทัลชีท</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-card: #111827;
  --bg-card-hover: #1a2332;
  --border: #1e293b;
  --border-accent: #f59e0b;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #f59e0b;
  --accent-dim: rgba(245, 158, 11, 0.15);
  --accent-glow: rgba(245, 158, 11, 0.3);
  --success: #22c55e;
  --danger: #ef4444;
  --gradient-start: #f59e0b;
  --gradient-end: #d97706;
  --sheet-long: #3b82f6;
  --sheet-short: #06b6d4;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Kanit', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Noise overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 16px 60px;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 36px;
  position: relative;
}

.header::after {
  content: '';
  display: block;
  width: 80px;
  height: 3px;
  background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
  margin: 16px auto 0;
  border-radius: 2px;
}

.header h1 {
  font-weight: 800;
  font-size: 28px;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), #fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header p {
  color: var(--text-secondary);
  font-weight: 300;
  font-size: 14px;
  margin-top: 6px;
}

/* Input Section */
.input-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}

.input-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.input-section h2 {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.input-section h2::before {
  content: '⬡';
  font-size: 14px;
}

.input-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}

.input-group {
  position: relative;
}

.input-group label {
  display: block;
  font-size: 12px;
  font-weight: 400;
  color: var(--text-secondary);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}

.input-group input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  transition: all 0.25s ease;
  outline: none;
}

.input-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

.input-group .unit {
  position: absolute;
  right: 14px;
  bottom: 13px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'Kanit', sans-serif;
  pointer-events: none;
}

/* Roof shape selector */
.shape-selector {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}

.shape-btn {
  flex: 1;
  padding: 14px 16px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-secondary);
  font-family: 'Kanit', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
}

.shape-btn:hover {
  border-color: var(--text-muted);
  background: var(--bg-card-hover);
}

.shape-btn.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}

.shape-btn svg {
  width: 32px;
  height: 24px;
}

/* Calculate Button */
.calc-btn {
  display: block;
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
  border: none;
  border-radius: 12px;
  color: #0a0e17;
  font-family: 'Kanit', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
  position: relative;
  overflow: hidden;
}

.calc-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 30px var(--accent-glow);
}

.calc-btn:active {
  transform: translateY(0);
}

/* Results */
.results {
  display: none;
  animation: slideUp 0.5s ease;
}

.results.show { display: block; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Summary Cards */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.summary-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.summary-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}

.summary-card:nth-child(1)::before { background: var(--accent); }
.summary-card:nth-child(2)::before { background: var(--sheet-long); }
.summary-card:nth-child(3)::before { background: var(--success); }
.summary-card:nth-child(4)::before { background: var(--sheet-short); }

.summary-card .label {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}

.summary-card .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px;
  font-weight: 600;
  color: var(--text-primary);
}

.summary-card .unit-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* Visual Diagram */
.diagram-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 28px;
  overflow-x: auto;
}

.diagram-section h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.diagram-section h3::before { content: '◆'; font-size: 10px; }

#roofDiagram {
  width: 100%;
  min-height: 200px;
}

/* Table */
.table-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 28px;
}

.table-section h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  padding: 20px 24px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.table-section h3::before { content: '◆'; font-size: 10px; }

.table-wrapper {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

thead th {
  background: rgba(245, 158, 11, 0.08);
  padding: 12px 16px;
  text-align: center;
  font-weight: 500;
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

tbody td {
  padding: 11px 16px;
  text-align: center;
  border-bottom: 1px solid rgba(30, 41, 59, 0.5);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  transition: background 0.15s;
}

tbody tr:hover td {
  background: rgba(245, 158, 11, 0.04);
}

tbody tr:last-child td {
  border-bottom: none;
}

.td-num { color: var(--text-muted); font-size: 12px; }
.td-width { color: var(--text-secondary); }
.td-length { color: var(--accent); font-weight: 600; }
.td-pos { color: var(--text-muted); font-size: 12px; }

.tag-full {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  background: rgba(34, 197, 94, 0.12);
  color: var(--success);
  font-family: 'Kanit', sans-serif;
}

.tag-partial {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  background: rgba(6, 182, 212, 0.12);
  color: var(--sheet-short);
  font-family: 'Kanit', sans-serif;
}

/* Copy section */
.copy-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 28px;
  position: relative;
}

.copy-section h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.copy-section h3::before { content: '◆'; font-size: 10px; }

.copy-box {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.8;
  white-space: pre-wrap;
  max-height: 400px;
  overflow-y: auto;
  user-select: all;
}

.copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  padding: 10px 20px;
  background: rgba(245, 158, 11, 0.12);
  border: 1px solid rgba(245, 158, 11, 0.3);
  border-radius: 10px;
  color: var(--accent);
  font-family: 'Kanit', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
}

.copy-btn:hover {
  background: rgba(245, 158, 11, 0.2);
  border-color: var(--accent);
}

.copy-btn.copied {
  background: rgba(34, 197, 94, 0.15);
  border-color: rgba(34, 197, 94, 0.4);
  color: var(--success);
}

/* Error */
.error-msg {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 12px;
  padding: 16px 20px;
  color: var(--danger);
  font-size: 14px;
  margin-top: 16px;
  display: none;
}

.error-msg.show { display: block; }

/* Footer */
.footer {
  text-align: center;
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 300;
}

@media (max-width: 600px) {
  .container { padding: 16px 12px 40px; }
  .input-section { padding: 20px 16px; }
  .header h1 { font-size: 22px; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .shape-btn { font-size: 12px; padding: 12px 10px; }
  table { font-size: 12px; }
  thead th, tbody td { padding: 10px 10px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>โปรแกรมไล่ระดับเมทัลชีท</h1>
    <p>คำนวณการตัดแผ่นเมทัลชีทสำหรับหลังคาทรงเฉียง</p>
  </div>

  <div class="input-section">
    <h2>ข้อมูลหลังคา</h2>

    <div class="shape-selector">
      <button class="shape-btn active" onclick="selectShape('trapezoid')" id="btnTrapezoid">
        <svg viewBox="0 0 48 32" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="10,4 38,4 44,28 4,28"/>
        </svg>
        สี่เหลี่ยมคางหมู
      </button>
      <button class="shape-btn" onclick="selectShape('triangle')" id="btnTriangle">
        <svg viewBox="0 0 48 32" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="24,4 44,28 4,28"/>
        </svg>
        สามเหลี่ยม
      </button>
    </div>

    <div class="input-grid">
      <div class="input-group">
        <label>หน้ากว้างใช้งาน (ต่อแผ่น)</label>
        <input type="number" id="sheetWidth" value="0.76" step="0.01" min="0.01">
        <span class="unit">เมตร</span>
      </div>
      <div class="input-group">
        <label>ความกว้างรวมหลังคา</label>
        <input type="number" id="totalWidth" value="12" step="0.01" min="0.01">
        <span class="unit">เมตร</span>
      </div>
      <div class="input-group">
        <label>ความยาวด้านยาวสุด</label>
        <input type="number" id="maxLength" value="11.40" step="0.01" min="0.01">
        <span class="unit">เมตร</span>
      </div>
      <div class="input-group" id="minLengthGroup">
        <label>ความยาวด้านสั้นสุด</label>
        <input type="number" id="minLength" value="8.60" step="0.01" min="0">
        <span class="unit">เมตร</span>
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()">คำนวณ</button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="results" id="results">
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="diagram-section">
      <h3>แผนผังการตัดแผ่น</h3>
      <svg id="roofDiagram"></svg>
    </div>
    <div class="copy-section">
      <h3>ข้อมูลสำหรับ Copy ไป Google Sheet</h3>
      <div class="copy-box" id="copyBox"></div>
      <button class="copy-btn" onclick="copyToClipboard()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        <span id="copyBtnText">คัดลอกข้อมูล</span>
      </button>
    </div>
    <div class="table-section">
      <h3>รายละเอียดแต่ละแผ่น</h3>
      <div class="table-wrapper">
        <table id="resultTable"></table>
      </div>
    </div>
  </div>

  <div class="footer">
    TK Metal Sheet — โปรแกรมคำนวณไล่ระดับเมทัลชีท
  </div>
</div>

<script>
let currentShape = 'trapezoid';

function selectShape(shape) {
  currentShape = shape;
  document.getElementById('btnTrapezoid').classList.toggle('active', shape === 'trapezoid');
  document.getElementById('btnTriangle').classList.toggle('active', shape === 'triangle');

  const minGroup = document.getElementById('minLengthGroup');
  if (shape === 'triangle') {
    minGroup.style.display = 'none';
    document.getElementById('minLength').value = '0';
  } else {
    minGroup.style.display = '';
    if (document.getElementById('minLength').value === '0') {
      document.getElementById('minLength').value = '8.60';
    }
  }
}

function calculate() {
  const errorEl = document.getElementById('errorMsg');
  errorEl.classList.remove('show');

  const sheetW = parseFloat(document.getElementById('sheetWidth').value);
  const totalW = parseFloat(document.getElementById('totalWidth').value);
  const maxL = parseFloat(document.getElementById('maxLength').value);
  const minL = parseFloat(document.getElementById('minLength').value);

  // Validation
  if (isNaN(sheetW) || isNaN(totalW) || isNaN(maxL) || isNaN(minL)) {
    showError('กรุณากรอกข้อมูลให้ครบทุกช่อง');
    return;
  }
  if (sheetW <= 0 || totalW <= 0 || maxL <= 0) {
    showError('ค่าต้องมากกว่า 0');
    return;
  }
  if (minL < 0) {
    showError('ความยาวด้านสั้นสุดต้องไม่ติดลบ');
    return;
  }
  if (maxL <= minL) {
    showError('ความยาวด้านยาวสุดต้องมากกว่าด้านสั้นสุด');
    return;
  }

  // Calculation
  const rate = (maxL - minL) / totalW;
  const fullSheets = Math.floor(totalW / sheetW);
  const remainder = round2(totalW - fullSheets * sheetW);
  const totalSheets = remainder > 0 ? fullSheets + 1 : fullSheets;

  const sheets = [];
  let totalLength = 0;

  for (let i = 0; i < totalSheets; i++) {
    const w = (i < fullSheets) ? sheetW : remainder;
    const startPos = round2(i * sheetW);
    const length = round2(maxL - startPos * rate);
    totalLength += length;
    sheets.push({
      num: i + 1,
      width: w,
      startPos: startPos,
      length: length,
      isFull: i < fullSheets
    });
  }

  totalLength = round2(totalLength);

  // Render
  renderSummary(totalSheets, totalLength, maxL, sheets[sheets.length - 1].length);
  renderCopyBox(sheets);
  renderTable(sheets);
  renderDiagram(sheets, totalW, maxL, minL);

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function round2(val) {
  return Math.round(val * 100) / 100;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function renderSummary(total, totalLen, maxLen, minLen) {
  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card">
      <div class="label">จำนวนแผ่น</div>
      <div class="value">${total}</div>
      <div class="unit-label">แผ่น</div>
    </div>
    <div class="summary-card">
      <div class="label">ยาวสุด</div>
      <div class="value">${maxLen.toFixed(2)}</div>
      <div class="unit-label">เมตร</div>
    </div>
    <div class="summary-card">
      <div class="label">ความยาวรวม</div>
      <div class="value">${totalLen.toFixed(2)}</div>
      <div class="unit-label">เมตร</div>
    </div>
    <div class="summary-card">
      <div class="label">สั้นสุด</div>
      <div class="value">${minLen.toFixed(2)}</div>
      <div class="unit-label">เมตร</div>
    </div>
  `;
}

function renderTable(sheets) {
  let html = `
    <thead>
      <tr>
        <th>แผ่นที่</th>
        <th>หน้ากว้าง (ม.)</th>
        <th>ตำแหน่งเริ่ม (ม.)</th>
        <th>ความยาวตัด (ม.)</th>
        <th>สถานะ</th>
      </tr>
    </thead>
    <tbody>
  `;

  sheets.forEach(s => {
    const tag = s.isFull
      ? '<span class="tag-full">เต็มแผ่น</span>'
      : `<span class="tag-partial">${s.width.toFixed(2)} ม.</span>`;

    html += `
      <tr>
        <td class="td-num">${s.num}</td>
        <td class="td-width">${s.width.toFixed(2)}</td>
        <td class="td-pos">${s.startPos.toFixed(2)}</td>
        <td class="td-length">${s.length.toFixed(2)}</td>
        <td>${tag}</td>
      </tr>
    `;
  });

  html += '</tbody>';
  document.getElementById('resultTable').innerHTML = html;
}

function renderCopyBox(sheets) {
  const lines = sheets.map(s =>
    `- แผ่นยาว ${s.length.toFixed(2)} เมตร 1 แผ่น\t${s.length.toFixed(2)}`
  );
  document.getElementById('copyBox').textContent = lines.join('\n');
}

function copyToClipboard() {
  const text = document.getElementById('copyBox').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    const btnText = document.getElementById('copyBtnText');
    btn.classList.add('copied');
    btnText.textContent = 'คัดลอกแล้ว ✓';
    setTimeout(() => {
      btn.classList.remove('copied');
      btnText.textContent = 'คัดลอกข้อมูล';
    }, 2000);
  });
}

function renderDiagram(sheets, totalW, maxL, minL) {
  const svg = document.getElementById('roofDiagram');
  const pad = 60;
  const svgW = 700;
  const svgH = 280;
  const drawW = svgW - pad * 2;
  const drawH = svgH - pad * 2;

  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);

  const scaleX = drawW / totalW;
  const scaleY = drawH / maxL;

  let svgContent = '';

  // Grid lines
  for (let i = 0; i <= 5; i++) {
    const y = pad + (drawH / 5) * i;
    const val = maxL - (maxL / 5) * i;
    svgContent += `<line x1="${pad}" y1="${y}" x2="${svgW - pad}" y2="${y}" stroke="#1e293b" stroke-width="0.5"/>`;
    svgContent += `<text x="${pad - 8}" y="${y + 4}" text-anchor="end" fill="#64748b" font-size="10" font-family="JetBrains Mono">${val.toFixed(1)}</text>`;
  }

  // Sheets as rectangles
  sheets.forEach((s, i) => {
    const x = pad + s.startPos * scaleX;
    const w = s.width * scaleX;
    const h = s.length * scaleY;
    const y = pad + drawH - h;

    // Color gradient based on position
    const t = i / (sheets.length - 1 || 1);
    const r = Math.round(59 + t * (6 - 59));
    const g = Math.round(130 + t * (182 - 130));
    const b = Math.round(246 + t * (212 - 246));

    svgContent += `<rect x="${x}" y="${y}" width="${Math.max(w - 1, 2)}" height="${h}" fill="rgba(${r},${g},${b},0.6)" stroke="rgba(${r},${g},${b},0.9)" stroke-width="0.5" rx="1"/>`;

    // Sheet number label (only show some on mobile)
    if (sheets.length <= 20 || i % 2 === 0) {
      svgContent += `<text x="${x + w / 2}" y="${svgH - pad + 16}" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="JetBrains Mono">${s.num}</text>`;
    }
  });

  // Slope line
  const x1 = pad;
  const y1 = pad + drawH - maxL * scaleY;
  const x2 = pad + drawW;
  const lastSheet = sheets[sheets.length - 1];
  const endLen = maxL - totalW * ((maxL - minL) / totalW);
  const y2 = pad + drawH - endLen * scaleY;
  svgContent += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${'var(--accent)'}" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>`;

  // Axis labels
  svgContent += `<text x="${svgW / 2}" y="${svgH - 8}" text-anchor="middle" fill="#64748b" font-size="11" font-family="Kanit">แผ่นที่</text>`;
  svgContent += `<text x="14" y="${svgH / 2}" text-anchor="middle" fill="#64748b" font-size="11" font-family="Kanit" transform="rotate(-90, 14, ${svgH / 2})">ความยาว (ม.)</text>`;

  // Dimension labels
  svgContent += `<text x="${pad}" y="${pad - 10}" text-anchor="start" fill="var(--accent)" font-size="11" font-family="JetBrains Mono" font-weight="600">${maxL.toFixed(2)} ม.</text>`;
  svgContent += `<text x="${svgW - pad}" y="${pad - 10}" text-anchor="end" fill="var(--sheet-short)" font-size="11" font-family="JetBrains Mono" font-weight="600">${minL.toFixed(2)} ม.</text>`;

  svg.innerHTML = svgContent;
}

// Auto-calculate on Enter
document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') calculate();
  });
});
</script>
</body>
</html>
